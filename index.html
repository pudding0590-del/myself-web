<body>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef, useCallback } = React;
    const Motion = window.Motion || window.FramerMotion;
    const motion = Motion.motion;

    // 抑制 Framer Motion 关于 list key 的良性警告
    const _origError = console.error;
    console.error = (...args) => {
      if (typeof args[0] === 'string' && (args[0].includes('list key') || args[0].includes('Each child in a list'))) return;
      _origError.apply(console, args);
    };

    // ============================================
    // Starfield：全局粒子星空背景（canvas）
    // 三层：背景星（闪烁）+ 彩色星尘（缓慢漂浮）+ 偶发流星
    // ============================================
    function Starfield() {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const DPR = Math.min(window.devicePixelRatio || 1, 2);
        let W = 0, H = 0;

        function resize() {
          W = window.innerWidth;
          H = window.innerHeight;
          canvas.width = W * DPR;
          canvas.height = H * DPR;
          canvas.style.width = W + 'px';
          canvas.style.height = H + 'px';
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        // 星云层：4 个超大柔光色斑，固定位置，呼吸式脉动
        const nebulae = [
          { px: 0.18, py: 0.22, rr: 0.62, c: 'rgba(168, 85, 247,',  baseO: 0.32, ph: 0    },
          { px: 0.82, py: 0.62, rr: 0.66, c: 'rgba(59, 130, 246,',  baseO: 0.30, ph: 1.6  },
          { px: 0.50, py: 0.50, rr: 0.80, c: 'rgba(236, 72, 153,',  baseO: 0.22, ph: 3.2  },
          { px: 0.08, py: 0.85, rr: 0.50, c: 'rgba(34, 211, 238,',  baseO: 0.26, ph: 4.7  }
        ];

        // 背景星：纯白小点，明亮闪烁
        const stars = Array.from({ length: 320 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.3 + 0.3,
          o: Math.random() * 0.45 + 0.5,
          tw: Math.random() * 0.003 + 0.0008,
          ph: Math.random() * Math.PI * 2
        }));

        // 彩色星尘：缓慢漂浮 + 辉光
        const dustColors = [
          'rgba(196, 181, 253,',  // 浅紫
          'rgba(147, 197, 253,',  // 浅蓝
          'rgba(165, 243, 252,',  // 浅青
          'rgba(251, 207, 232,',  // 浅粉
          'rgba(255, 255, 255,'   // 白
        ];
        const dust = Array.from({ length: 80 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.16,
          vy: (Math.random() - 0.5) * 0.16,
          r: Math.random() * 1.8 + 0.7,
          o: Math.random() * 0.45 + 0.3,
          c: dustColors[Math.floor(Math.random() * dustColors.length)]
        }));

        // 流星
        let shooting = [];
        let nextShoot = performance.now() + 2500 + Math.random() * 4000;

        function spawnShoot() {
          const fromLeft = Math.random() > 0.5;
          const speed = Math.random() * 5 + 9;
          const angle = Math.random() * 0.25 + 0.15;
          shooting.push({
            x: fromLeft ? -60 : W + 60,
            y: Math.random() * H * 0.55,
            vx: speed * (fromLeft ? 1 : -1),
            vy: speed * angle,
            life: 1
          });
        }

        let raf;
        function tick(now) {
          ctx.clearRect(0, 0, W, H);

          // 星云：最底层柔光色斑（呼吸脉动）
          for (const n of nebulae) {
            const x = n.px * W;
            const y = n.py * H;
            const r = n.rr * Math.min(W, H);
            const pulse = 1 + Math.sin(now * 0.00035 + n.ph) * 0.12;
            const op = n.baseO * pulse;
            const g = ctx.createRadialGradient(x, y, 0, x, y, r);
            g.addColorStop(0,   n.c + op + ')');
            g.addColorStop(0.45, n.c + (op * 0.5) + ')');
            g.addColorStop(1,   n.c + '0)');
            ctx.fillStyle = g;
            ctx.fillRect(x - r, y - r, r * 2, r * 2);
          }

          // 背景星
          for (const s of stars) {
            const sin = Math.sin(now * s.tw + s.ph);
            const opacity = s.o * (0.55 + sin * 0.45);
            ctx.fillStyle = 'rgba(255, 255, 255, ' + opacity + ')';
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
          }

          // 彩色星尘（带轻微辉光）
          for (const d of dust) {
            d.x += d.vx;
            d.y += d.vy;
            if (d.x < -10) d.x = W + 10;
            if (d.x > W + 10) d.x = -10;
            if (d.y < -10) d.y = H + 10;
            if (d.y > H + 10) d.y = -10;
            // glow
            ctx.fillStyle = d.c + (d.o * 0.35) + ')';
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r * 3, 0, Math.PI * 2);
            ctx.fill();
            // core
            ctx.fillStyle = d.c + d.o + ')';
            ctx.beginPath();
            ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
            ctx.fill();
          }

          // 流星
          if (now >= nextShoot) {
            spawnShoot();
            nextShoot = now + 5000 + Math.random() * 8000;
          }
          for (let i = shooting.length - 1; i >= 0; i--) {
            const ss = shooting[i];
            ss.x += ss.vx;
            ss.y += ss.vy;
            ss.life -= 0.011;
            if (ss.life <= 0 || ss.x < -120 || ss.x > W + 120 || ss.y > H + 80) {
              shooting.splice(i, 1);
              continue;
            }
            const mag = Math.hypot(ss.vx, ss.vy);
            const tailLen = 70;
            const tailX = ss.x - (ss.vx / mag) * tailLen;
            const tailY = ss.y - (ss.vy / mag) * tailLen;
            const grad = ctx.createLinearGradient(ss.x, ss.y, tailX, tailY);
            grad.addColorStop(0, 'rgba(255, 255, 255, ' + (ss.life * 0.95) + ')');
            grad.addColorStop(0.4, 'rgba(180, 220, 255, ' + (ss.life * 0.5) + ')');
            grad.addColorStop(1, 'rgba(120, 180, 255, 0)');
            ctx.strokeStyle = grad;
            ctx.lineWidth = 1.6;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(ss.x, ss.y);
            ctx.lineTo(tailX, tailY);
            ctx.stroke();
            // 头部小亮点
            ctx.fillStyle = 'rgba(255, 255, 255, ' + ss.life + ')';
            ctx.beginPath();
            ctx.arc(ss.x, ss.y, 1.8, 0, Math.PI * 2);
            ctx.fill();
          }

          raf = requestAnimationFrame(tick);
        }
        raf = requestAnimationFrame(tick);

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', resize);
        };
      }, []);

      return (
        <canvas
          ref={canvasRef}
          className="fixed inset-0 pointer-events-none"
          style={{ zIndex: 0 }}
        />
      );
    }

    // ============================================
    // BlurText：词级 blur-in 入场，IntersectionObserver 触发
    // 用 \n 强制换行；每行内可用空格分词做错时入场
    // ============================================
    function BlurText({ text, className, delayBase = 0 }) {
      const containerRef = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const node = containerRef.current;
        if (!node) return;
        const io = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) { setVisible(true); io.disconnect(); }
        }, { threshold: 0.1 });
        io.observe(node);
        return () => io.disconnect();
      }, []);
      const lines = text.split('\n');
      let chunkIdx = 0;
      return (
        <div ref={containerRef} className={className}>
          {lines.map((line, li) => {
            const words = line.split(' ');
            return (
              <div
                key={li}
                style={{ display: 'flex', flexWrap: 'nowrap', justifyContent: 'center', whiteSpace: 'nowrap' }}
              >
                {words.map((word, wi) => {
                  const i = chunkIdx++;
                  return (
                    <motion.span
                      key={wi}
                      initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
                      animate={visible ? {
                        filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                        opacity: [0, 0.5, 1],
                        y: [50, -5, 0]
                      } : undefined}
                      transition={{ duration: 0.7, times: [0, 0.5, 1], ease: 'easeOut', delay: delayBase + (i * 100) / 1000 }}
                      style={{ display: 'inline-block', marginRight: wi < words.length - 1 ? '0.28em' : '0' }}
                    >
                      {word}
                    </motion.span>
                  );
                })}
              </div>
            );
          })}
        </div>
      );
    }

    // ============================================
    // PopIn：滚动进入视口时的"蹦出"动画
    // y + opacity + blur + scale 复合入场，once: true 只触发一次
    // ============================================
    function PopIn({ children, delay = 0, y = 48, className = '' }) {
      return (
        <motion.div
          initial={{ opacity: 0, y, filter: 'blur(10px)', scale: 0.96 }}
          whileInView={{ opacity: 1, y: 0, filter: 'blur(0px)', scale: 1 }}
          viewport={{ once: false, margin: '-60px' }}
          transition={{ duration: 0.75, delay, ease: [0.16, 1, 0.3, 1] }}
          className={className}
        >
          {children}
        </motion.div>
      );
    }

    // 图标
    // ============================================

      globe:    'M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM18.92 8h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z',
      megaphone:'M21 11h-2v2h2v-2zm-2 5.51c.91.59 1.97 1.07 3 1.32v-2.07c-.78-.21-1.96-.94-3-1.74v2.49zM22 8.17c-1.03.25-2.09.73-3 1.32v2.49c1.04-.8 2.22-1.53 3-1.74V8.17zM5 9H2v6h3l4 4V5L5 9z'
    };

    // ============================================
    // 数据
    // ============================================
    const NAV = [
      { label: '首页', href: '#top' },
      { label: '关于', href: '#about' },
      { label: '案例', href: '#cases' },
      { label: '方法', href: '#method' },

    ];

    const CASES = [
      { name: '[品牌 A]', period: '2024 — 至今', tags: ['抖音', '小红书', '私域'], metric: '+58万', sub: '8 个月涨粉 / GMV 月销破 300万', desc: '从 0 起号，重构内容人设 + AI 批量化生产 + 私域漏斗，把单纯的颜值号做成带货 IP。', icon: ICON.target },
      { name: '[品牌 B]', period: '2023 — 2024', tags: ['B站', '知乎', '长内容'],   metric: '12×',   sub: '单条爆款最高 1200万 播放',     desc: '为科技品牌搭建知识型 IP 矩阵，用 AI 做选题挖掘 + 脚本结构化，单账号产能提升 12 倍。',     icon: ICON.chart },
      { name: '[品牌 C]', period: '2024 Q2',    tags: ['视频号', '直播', '中老年'], metric: '¥820万', sub: '单场直播 GMV / 连续 3 场破百万',  desc: '瞄准银发经济，用 AI 做粉丝画像 + 选品策略，把传统消费品做成情绪共鸣型 IP。',                icon: ICON.megaphone },

    const METHODS = [

      { step: 'Step 02', title: '内容生产', icon: ICON.layers,    tags: ['选题挖掘', 'Agent 脚本', '视觉批产', '剪辑流水线'], desc: '搭一套属于你的 Prompt 套件 + Agent 流水线，一个人撑起一支团队的产能，从选题到分发全自动。' },
      { step: 'Step 03', title: '数据迭代', icon: ICON.chart,     tags: ['多平台看板', '爆款归因', 'Prompt 库迭代', '日更复盘'], desc: '每周用 AI 复盘"哪条爆了、为什么爆"，把成功模式沉淀回 Prompt 库——越跑越准，不靠运气。' }
    ];

    const WORKS = [
      { platform: '抖音 · 视频',     title: '爆款拆解：为什么这条视频火了？',           meta: '320万 播放 · 1.2万 赞',  seed: 'work1' },
